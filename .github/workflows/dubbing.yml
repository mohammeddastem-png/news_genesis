name: Live dubbing worker

on:
  schedule:
    - cron: '*/5 * * * *' # ഓരോ 5 മിനിറ്റിലും (GitHub limits അനുസരിച്ച്)
  workflow_dispatch:

jobs:
  dubbing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin google-generativeai edge-tts pydub cloudinary yt-dlp
      
      - name: Run dubbing worker
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          # Cloudinary Secrets
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python dubbing_worker.py